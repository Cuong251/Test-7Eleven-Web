version: '3.8'

services:
  db:
    image: postgres:15
    container_name: seven-eleven-db
    restart: always
    environment:
      POSTGRES_DB: seven_eleven_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seven-eleven-backend
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/seven_eleven_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=1234
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      - db

  frontend:
    build:
      context: ../Test-7Eleven-Web
      dockerfile: Dockerfile
    container_name: seven-eleven-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
